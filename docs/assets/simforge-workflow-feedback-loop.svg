<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">SimForge robotics authoring and simulation feedback loop</title>
  <desc id="desc">Four steps flow from text prompt to Blender 3D design, physics and USD export, and Isaac Sim simulation. A feedback and improvements box returns simulation evidence to the design revision point between Blender and export.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#071019"/>
      <stop offset="1" stop-color="#0a1720"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#68ead0"/>
      <stop offset="1" stop-color="#72b5d5"/>
    </linearGradient>
    <pattern id="grid" width="56" height="56" patternUnits="userSpaceOnUse">
      <path d="M56 0H0V56" fill="none" stroke="#18343e" stroke-width="1" opacity="0.28"/>
      <circle cx="0" cy="0" r="2" fill="#28505b" opacity="0.28"/>
    </pattern>
    <filter id="soft-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="15" stdDeviation="20" flood-color="#000000" flood-opacity="0.32"/>
    </filter>
    <marker id="arrow" viewBox="0 0 20 20" markerWidth="20" markerHeight="20" refX="18" refY="10" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0 0L20 10L0 20Z" fill="#68ead0"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 20 20" markerWidth="20" markerHeight="20" refX="18" refY="10" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0 0L20 10L0 20Z" fill="#72b5d5"/>
    </marker>
  </defs>

  <rect width="1600" height="900" fill="url(#background)"/>
  <rect width="1600" height="900" fill="url(#grid)"/>
  <circle cx="800" cy="415" r="530" fill="#68ead0" opacity="0.025"/>

  <g fill="none" stroke="#28505b" stroke-width="2" opacity="0.42">
    <path d="M0 98H142L188 144H292"/>
    <path d="M0 126H126L172 172H248"/>
    <circle cx="292" cy="144" r="4" fill="#28505b"/>
    <circle cx="248" cy="172" r="4" fill="#28505b"/>
    <path d="M1600 98H1458L1412 144H1308"/>
    <path d="M1600 126H1474L1428 172H1352"/>
    <circle cx="1308" cy="144" r="4" fill="#28505b"/>
    <circle cx="1352" cy="172" r="4" fill="#28505b"/>
  </g>

  <g font-family="Segoe UI, Arial, sans-serif" text-anchor="middle">
    <text x="800" y="72" fill="#68ead0" font-size="17" font-weight="700" letter-spacing="6">SIMFORGE EVOLVE</text>
    <text x="800" y="112" fill="#dbe9ed" font-size="34" font-weight="650">From idea to simulation evidence</text>
    <text x="800" y="145" fill="#78939c" font-size="17">A human-controlled robotics authoring loop</text>
  </g>

  <g fill="none" stroke="#68ead0" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)">
    <path d="M374 370H444"/>
    <path d="M759 370H829"/>
    <path d="M1144 370H1214"/>
  </g>

  <g id="prompt" transform="translate(70 225)" filter="url(#shadow)">
    <rect width="304" height="290" rx="22" fill="#0a1720" stroke="#28505b" stroke-width="2"/>
    <rect x="22" y="20" width="46" height="28" rx="14" fill="#103c39"/>
    <text x="45" y="40" fill="#68ead0" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" text-anchor="middle">01</text>
    <g transform="translate(111 68)" fill="none" stroke="#68ead0" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
      <path d="M8 10H74A20 20 0 0 1 94 30V69A20 20 0 0 1 74 89H39L16 106V89H8A20 20 0 0 1-12 69V30A20 20 0 0 1 8 10Z"/>
      <circle cx="20" cy="50" r="4" fill="#68ead0" stroke="none"/>
      <circle cx="41" cy="50" r="4" fill="#68ead0" stroke="none"/>
      <circle cx="62" cy="50" r="4" fill="#68ead0" stroke="none"/>
    </g>
    <text x="152" y="210" fill="#dbe9ed" font-family="Segoe UI, Arial, sans-serif" font-size="25" font-weight="650" text-anchor="middle">TEXT PROMPT</text>
    <text x="152" y="244" fill="#78939c" font-family="Segoe UI, Arial, sans-serif" font-size="16" text-anchor="middle">Describe the robotics goal</text>
  </g>

  <g id="blender" transform="translate(455 225)" filter="url(#shadow)">
    <rect width="304" height="290" rx="22" fill="#0a1720" stroke="#28505b" stroke-width="2"/>
    <rect x="22" y="20" width="46" height="28" rx="14" fill="#103c39"/>
    <text x="45" y="40" fill="#68ead0" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" text-anchor="middle">02</text>
    <g transform="translate(100 65)" fill="none" stroke="#68ead0" stroke-width="5" stroke-linejoin="round">
      <path d="M52 5L104 35V95L52 125L0 95V35Z"/>
      <path d="M0 35L52 65L104 35M52 65V125"/>
      <circle cx="52" cy="65" r="8" fill="#72b5d5" stroke="#071019" stroke-width="4"/>
    </g>
    <text x="152" y="210" fill="#dbe9ed" font-family="Segoe UI, Arial, sans-serif" font-size="25" font-weight="650" text-anchor="middle">BLENDER 3D</text>
    <text x="152" y="244" fill="#78939c" font-family="Segoe UI, Arial, sans-serif" font-size="16" text-anchor="middle">Create and refine the design</text>
  </g>

  <g id="usd" transform="translate(840 225)" filter="url(#shadow)">
    <rect width="304" height="290" rx="22" fill="#0a1720" stroke="#28505b" stroke-width="2"/>
    <rect x="22" y="20" width="46" height="28" rx="14" fill="#103c39"/>
    <text x="45" y="40" fill="#68ead0" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" text-anchor="middle">03</text>
    <g transform="translate(101 69)" fill="none" stroke="#68ead0" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M15 0H73L103 30V112H15Z"/>
      <path d="M73 0V30H103"/>
      <path d="M34 56H84M34 76H84M34 96H68" stroke="#72b5d5"/>
      <circle cx="14" cy="111" r="11" fill="#103c39"/>
      <path d="M7 111L12 116L22 105"/>
    </g>
    <text x="152" y="202" fill="#dbe9ed" font-family="Segoe UI, Arial, sans-serif" font-size="23" font-weight="650" text-anchor="middle">PHYSICS + USD</text>
    <text x="152" y="232" fill="#dbe9ed" font-family="Segoe UI, Arial, sans-serif" font-size="23" font-weight="650" text-anchor="middle">EXPORT</text>
    <text x="152" y="263" fill="#78939c" font-family="Segoe UI, Arial, sans-serif" font-size="16" text-anchor="middle">Author and verify the package</text>
  </g>

  <g id="isaac" transform="translate(1225 225)" filter="url(#shadow)">
    <rect width="304" height="290" rx="22" fill="#0a1720" stroke="#28505b" stroke-width="2"/>
    <rect x="22" y="20" width="46" height="28" rx="14" fill="#103c39"/>
    <text x="45" y="40" fill="#68ead0" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" text-anchor="middle">04</text>
    <g transform="translate(95 64)" fill="none" stroke="#68ead0" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M8 100H112M20 100V76H100V100"/>
      <circle cx="37" cy="108" r="13"/>
      <circle cx="87" cy="108" r="13"/>
      <path d="M46 76V47H76V76M61 47V25M61 25L88 11M88 11L103 29"/>
      <circle cx="61" cy="47" r="7" fill="#72b5d5"/>
      <circle cx="88" cy="11" r="7" fill="#72b5d5"/>
    </g>
    <text x="152" y="202" fill="#dbe9ed" font-family="Segoe UI, Arial, sans-serif" font-size="23" font-weight="650" text-anchor="middle">ISAAC SIM</text>
    <text x="152" y="232" fill="#dbe9ed" font-family="Segoe UI, Arial, sans-serif" font-size="23" font-weight="650" text-anchor="middle">SIMULATION</text>
    <text x="152" y="263" fill="#78939c" font-family="Segoe UI, Arial, sans-serif" font-size="16" text-anchor="middle">Run and measure the task</text>
  </g>

  <circle cx="799" cy="370" r="12" fill="#103c39" stroke="#68ead0" stroke-width="4"/>
  <circle cx="799" cy="370" r="4" fill="#68ead0"/>

  <path d="M1377 515C1377 600 1225 650 1095 679" fill="none" stroke="#72b5d5" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow-blue)"/>

  <g id="feedback" transform="translate(500 650)" filter="url(#shadow)">
    <rect width="600" height="150" rx="24" fill="#103c39" stroke="#68ead0" stroke-width="3"/>
    <g transform="translate(42 40)" fill="none" stroke="#68ead0" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M60 13A33 33 0 1 0 70 50"/>
      <path d="M52 2L66 14L49 22"/>
    </g>
    <text x="335" y="64" fill="#dbe9ed" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="650" text-anchor="middle">FEEDBACK LOOP + IMPROVEMENTS</text>
    <text x="335" y="101" fill="#a8d8cc" font-family="Segoe UI, Arial, sans-serif" font-size="17" text-anchor="middle">Simulation evidence informs the next design revision</text>
  </g>

  <path d="M560 650C455 585 540 462 785 382" fill="none" stroke="#68ead0" stroke-width="4" stroke-linecap="round" stroke-dasharray="10 13" marker-end="url(#arrow)"/>
  <g transform="translate(486 525)">
    <rect width="226" height="34" rx="17" fill="#071019" stroke="#28505b"/>
    <text x="113" y="23" fill="#68ead0" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="650" text-anchor="middle" letter-spacing="1">EVIDENCE-GUIDED ITERATION</text>
  </g>
</svg>
