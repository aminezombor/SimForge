<svg xmlns="http://www.w3.org/2000/svg" width="2000" height="1000" viewBox="0 0 2000 1000" role="img" aria-labelledby="title desc">
  <title id="title">SimForge Evolve robotics optimization loop</title>
  <desc id="desc">A dotted boundary encloses text prompt, Blender design, physics and USD export, Isaac Sim simulation, and a feedback loop. The workflow outputs the best robot design for the task.</desc>
  <defs>
    <marker id="mint-arrow" viewBox="0 0 20 20" markerWidth="20" markerHeight="20" refX="18" refY="10" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0 0L20 10L0 20Z" fill="#68ead0"/>
    </marker>
    <marker id="blue-arrow" viewBox="0 0 20 20" markerWidth="20" markerHeight="20" refX="18" refY="10" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0 0L20 10L0 20Z" fill="#72b5d5"/>
    </marker>
  </defs>

  <rect width="2000" height="1000" fill="#071019"/>

  <g font-family="Segoe UI, Arial, sans-serif" text-anchor="middle">
    <text x="760" y="80" fill="#68ead0" font-size="19" font-weight="700" letter-spacing="8">SIMFORGE EVOLVE</text>
    <text x="760" y="130" fill="#dbe9ed" font-size="40" font-weight="650">Idea to simulation feedback</text>
  </g>

  <rect x="35" y="185" width="1450" height="705" rx="82" fill="none" stroke="#dbe9ed" stroke-width="3" stroke-dasharray="12 13"/>

  <g fill="#0a1720" stroke="#28505b" stroke-width="3">
    <rect x="85" y="260" width="270" height="190" rx="20"/>
    <rect x="420" y="260" width="270" height="190" rx="20"/>
    <rect x="755" y="260" width="270" height="190" rx="20"/>
    <rect x="1090" y="260" width="270" height="190" rx="20"/>
  </g>

  <g font-family="Segoe UI, Arial, sans-serif" fill="#dbe9ed" font-size="25" font-weight="650" text-anchor="middle">
    <text x="220" y="365">TEXT PROMPT</text>
    <text x="555" y="344">BLENDER 3D</text>
    <text x="555" y="380">DESIGN</text>
    <text x="890" y="344">PHYSICS + USD</text>
    <text x="890" y="380">EXPORT</text>
    <text x="1225" y="344">ISAAC SIM</text>
    <text x="1225" y="380">SIMULATION</text>
  </g>

  <g fill="none" stroke="#68ead0" stroke-width="6" stroke-linecap="round" marker-end="url(#mint-arrow)">
    <path d="M355 355H420"/>
    <path d="M690 355H755"/>
    <path d="M1025 355H1090"/>
  </g>

  <ellipse cx="890" cy="565" rx="190" ry="72" fill="#071019" stroke="#68ead0" stroke-width="3" stroke-dasharray="9 8"/>
  <g font-family="Segoe UI, Arial, sans-serif" fill="#dbe9ed" font-size="21" font-weight="600" text-anchor="middle">
    <text x="890" y="548">ROBOTICS TOPOLOGY</text>
    <text x="890" y="579">OPTIMIZATION</text>
  </g>
  <path d="M730 526H770" fill="none" stroke="#68ead0" stroke-width="4" marker-end="url(#mint-arrow)"/>
  <path d="M1050 604H1010" fill="none" stroke="#68ead0" stroke-width="4" marker-end="url(#mint-arrow)"/>

  <rect x="425" y="690" width="600" height="125" rx="22" fill="#103c39" stroke="#68ead0" stroke-width="3"/>
  <g font-family="Segoe UI, Arial, sans-serif" text-anchor="middle">
    <text x="725" y="747" fill="#dbe9ed" font-size="27" font-weight="650">FEEDBACK LOOP + IMPROVEMENTS</text>
    <text x="725" y="783" fill="#a8d8cc" font-size="17">Use simulation evidence to improve the design</text>
  </g>

  <path d="M1225 450V600Q1225 620 1205 620H1045Q1025 620 1025 640V690"
        fill="none" stroke="#72b5d5" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#blue-arrow)"/>

  <path d="M555 690V470"
        fill="none" stroke="#68ead0" stroke-width="5" stroke-linecap="round"
        stroke-dasharray="13 14" marker-end="url(#mint-arrow)"/>

  <path d="M1485 535H1595" fill="none" stroke="#68ead0" stroke-width="6" stroke-linecap="round" marker-end="url(#mint-arrow)"/>

  <g id="result">
    <rect x="1600" y="285" width="350" height="500" rx="34" fill="#0a1720" stroke="#68ead0" stroke-width="4"/>

    <g transform="translate(1684 338)" fill="none" stroke="#68ead0" stroke-width="7" stroke-linecap="round" stroke-linejoin="round">
      <path d="M34 165L34 111Q34 96 49 96Q64 96 64 111V137"/>
      <path d="M64 134V70Q64 55 79 55Q94 55 94 70V130"/>
      <path d="M94 126V44Q94 29 109 29Q124 29 124 44V128"/>
      <path d="M124 124V67Q124 52 139 52Q154 52 154 67V145"/>
      <path d="M154 139L175 117Q186 105 197 114Q207 123 198 136L169 180Q154 201 130 205H80Q49 205 34 181Z"/>
      <rect x="69" y="205" width="92" height="36" rx="9" stroke="#72b5d5"/>
      <circle cx="79" cy="55" r="7" fill="#071019"/>
      <circle cx="109" cy="29" r="7" fill="#071019"/>
      <circle cx="139" cy="52" r="7" fill="#071019"/>
    </g>

    <g font-family="Segoe UI, Arial, sans-serif" text-anchor="middle">
      <text x="1775" y="640" fill="#dbe9ed" font-size="30" font-weight="650">BEST ROBOT</text>
      <text x="1775" y="681" fill="#dbe9ed" font-size="30" font-weight="650">DESIGN FOR</text>
      <text x="1775" y="722" fill="#68ead0" font-size="30" font-weight="650">THE TASK</text>
    </g>
  </g>
</svg>
